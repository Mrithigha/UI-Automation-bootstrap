# ============================================================
# Base configuration applies to all environments.
# Override any key via:
#   System property:    -Dkey=value           (highest priority)
#   Env overlay:        config-{env}.properties (second priority)
#   This file:          default values         (lowest priority)
# ============================================================

# Browser: chrome | firefox | edge
browser=chrome

# Set to true to run without opening a browser window
headless=false

# Frontend base URL
base.url=http://localhost:3000

# API base URL used by ApiUtils (falls back to base.url if absent)
api.base.url=http://localhost:3000/api

# Selenium implicit wait (seconds)
implicit.wait=10

# Explicit WebDriverWait timeout (seconds)
explicit.wait=15

# Directory where the browser saves downloaded files
# Use an absolute path in CI; relative paths resolve from the project root
download.dir=downloads

# Retry configuration for flaky element interactions
retry.max.attempts=3
retry.delay.millis=500
